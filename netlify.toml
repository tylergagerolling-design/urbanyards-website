[build]
  command = "node scripts/build-dashboard-config.js && npm run check && npm test"
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/dashboard/"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/auth/callback"
  to = "/auth/callback.html"
  status = 200

[[redirects]]
  from = "/auth/callback/"
  to = "/auth/callback.html"
  status = 200

[[redirects]]
  from = "/pay"
  to = "/pay.html"
  status = 200

[[redirects]]
  from = "/pay/"
  to = "/pay.html"
  status = 200

[[redirects]]
  from = "/api/admin/upload-user-avatar"
  to = "/.netlify/functions/admin-upload-user-avatar"
  status = 200

[[redirects]]
  from = "/api/user/upload-avatar"
  to = "/.netlify/functions/user-upload-avatar"
  status = 200

[[redirects]]
  from = "/api/user/delete-avatar"
  to = "/.netlify/functions/user-delete-avatar"
  status = 200

[[redirects]]
  from = "/api/retention-cleanup"
  to = "/.netlify/functions/retention-cleanup"
  status = 404

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Cross-Origin-Opener-Policy = "same-origin"
    X-Permitted-Cross-Domain-Policies = "none"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src-elem 'self' https://maps.googleapis.com https://challenges.cloudflare.com https://plausible.io; script-src-attr 'none'; style-src-elem 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com https://gvdeqqrbonulwgmgpgis.supabase.co https://maps.googleapis.com https://maps.gstatic.com https://tile.openstreetmap.org https://*.tile.openstreetmap.org; connect-src 'self' https://gvdeqqrbonulwgmgpgis.supabase.co https://maps.googleapis.com https://maps.gstatic.com https://tile.openstreetmap.org https://*.tile.openstreetmap.org https://challenges.cloudflare.com https://plausible.io; frame-src https://challenges.cloudflare.com; font-src 'self' https://fonts.gstatic.com; media-src 'self'; object-src 'none'; worker-src 'none'; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/dashboard.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/dashboard"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/dashboard-config.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
