<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" content="#123f31">
    <title>Urban Yards Dashboard Invite</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/auth/callback.css">
    <script src="/dashboard-config.js" defer></script>
    <script src="/auth/callback.js" defer></script>
  </head>
  <body>
    <main class="auth-callback-shell" aria-labelledby="auth-callback-title">
      <section class="auth-callback-card">
        <img src="/images/urban-yards-mark.png?v=20260603-12" alt="Urban Yards" class="auth-callback-logo">
        <p class="auth-callback-eyebrow">Owner Dashboard</p>
        <h1 id="auth-callback-title">Checking Your Invite</h1>
        <p data-auth-callback-message>One moment while we finish signing you in.</p>
        <a class="auth-callback-action" href="/dashboard" data-auth-callback-login hidden>Back to Login</a>
      </section>
    </main>
  </body>
</html>
